project:
  name: quant-pairs-trading-research
  objective: cointegration_based_pairs_trading_strategy_research
  report_type: strategy_quant_research_report

data:
  source: yfinance
  tickers: []
  start_date: 2008-01-01
  end_date: 2025-12-31
  frequency: daily
  price_field: adjusted_close
  ohlcv_required: true
  raw_dir: data/raw
  processed_dir: data/processed
  cache_enabled: true
  validation:
    report_dir: results/data
    min_history_days: 252
    max_missing_fraction: 0.10
    required_columns:
      - date
      - open
      - high
      - low
      - close
      - adjusted_close
      - volume

walk_forward:
  initial_train_start: 2008-01-01
  initial_train_end: 2018-12-31
  validation_start: 2019-01-01
  validation_end: 2021-12-31
  test_start: 2022-01-01
  test_end: 2024-12-31
  final_holdout_start: 2025-01-01
  final_holdout_end: 2025-12-31
  retrain_frequency: quarterly
  pair_reselection_frequency: annually
  hedge_ratio_update_frequency: quarterly

universe:
  default: sp500_current_constituents
  constituents_path: data/universe/sp500_constituents.csv
  output_dir: results/universe
  clean_universe_file: clean_universe.csv
  audit_file: universe_audit.csv
  required_columns:
    - ticker
    - company_name
    - sector
    - industry
  sector_pairing: same_sector
  acknowledge_survivorship_bias: true
  filters:
    min_adjusted_close_price: 5.0
    min_average_daily_dollar_volume: 10000000
    max_missing_data_ratio: 0.10
    max_zero_volume_days: 0
    min_history_days: 252

pair_selection:
  output_dir: results/pairs
  candidate_pairs_file: candidate_pairs.csv
  selected_pairs_file: selected_pairs.csv
  diagnostics_file: pair_diagnostics.csv
  same_sector_only: true
  min_return_correlation: 0.6
  cointegration_test: engle_granger
  multiple_testing_correction: benjamini_hochberg_fdr
  fdr_alpha: 0.05
  half_life_min_days: 2
  half_life_max_days: 60
  top_n_pairs: 10
  formation_window_days: 504
  min_overlap_days: 504

spread:
  definition: log_price_hedge_ratio_adjusted
  hedge_ratio_method: static_ols
  estimate_beta_on: formation_training_window_only
  allow_rolling_ols_robustness: true
  output_dir: results/spreads
  spread_series_file: spread_series.csv
  diagnostics_file: spread_diagnostics.csv
  zscores_file: zscores.csv
  default_z_score_window: 60
  z_score_windows:
    - 20
    - 60
    - 120

features:
  lag_all_features_days: 1
  output_dir: results/features
  features_all_file: features_all.csv
  train_file: features_train.csv
  validation_file: features_validation.csv
  test_file: features_test.csv
  holdout_file: features_holdout_2025.csv
  metadata_file: feature_metadata.csv
  drop_missing_rows: true
  target:
    default: next_day_spread
    include:
      - next_day_spread
      - next_day_spread_change
  lags:
    - 1
  enabled:
    - lagged_spread
    - lagged_z_score
    - rolling_spread_mean
    - rolling_spread_volatility
    - spread_momentum
    - return_differential
    - rolling_correlation
    - volume_ratio
    - market_return_proxy
    - volatility_regime_proxy
  rolling_windows:
    z_score: 60
    spread_mean: 60
    spread_volatility: 60
    momentum: 5
    correlation: 60
    volatility: 60
  market_proxy_ticker:
  volatility_regime_window: 60

models:
  enabled:
    - naive
    - rolling_mean
    - arima
    - kalman_filter
    - xgboost
    - lstm
  interface:
    - fit
    - predict
    - predict_one_step
  validation: walk_forward
  forecasting_enabled:
    - naive
    - rolling_mean
    - arima
    - xgboost
    - lstm
  target_column: target_next_day_spread
  output_dir: results/forecasts
  predictions_file: predictions.csv
  metrics_file: forecasting_metrics.csv
  comparison_file: model_comparison.csv
  train_validation_for_test: false
  rolling_mean:
    window: 20
  arima:
    order:
      - 1
      - 0
      - 0
  xgboost:
    n_estimators: 200
    max_depth: 3
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42
    objective: reg:squarederror
    missing_feature_strategy: median
  lstm:
    sequence_length: 20
    hidden_size: 32
    num_layers: 1
    dropout: 0.1
    learning_rate: 0.001
    batch_size: 32
    max_epochs: 20
    patience: 3
    random_state: 42
    scale_features: true
    missing_feature_strategy: median

forecasting:
  model_selection_metric: rmse
  model_selection_split: validation
  model_selection_direction: minimize
  default_signal_model: best_validation

signals:
  signal_model: best_validation
  entry_z: 2.0
  exit_z: 0.5
  stop_loss_z: 3.0
  max_holding_days: 60
  generate_train_signals: false
  use_predicted_spread: true
  use_predicted_zscore: true
  z_score_window: 60
  output_dir: results/signals
  signals_file: signals.csv
  summary_file: signal_summary.csv

backtest:
  method: walk_forward_out_of_sample
  initial_capital: 100000
  commission_bps: 5
  slippage_bps: 2
  borrow_cost_bps: 0
  capital_allocation: equal_weight
  # beta_scaled_gross makes leg-2 notional proportional to abs(beta);
  # total gross exposure per pair is capped by initial_capital / max_active_pairs.
  # Net dollar exposure may not be exactly zero when beta != 1.
  position_sizing: beta_scaled_gross
  max_active_pairs: 20
  generate_train_backtest: false
  output_dir: results/backtests

analytics:
  risk_free_rate: 0.0
  trading_days_per_year: 252
  output_dir: results/analytics

robustness:
  enabled: true
  output_dir: results/robustness
  entry_z_values:
    - 1.5
    - 2.0
  exit_z_values:
    - 0.5
  stop_loss_z_values:
    - 3.0
  commission_bps_values:
    - 0
    - 5
  slippage_bps_values:
    - 2
  zscore_window_values:
    - 60
  signal_model_values:
    - best_validation
  max_scenarios: 10
  # Robustness scenario ranking currently assumes higher-is-better metrics.
  # Use metrics such as sharpe_ratio or calmar_ratio; lower-is-better ranking is not implemented.
  selection_metric: sharpe_ratio
  selection_split: validation
  concentration_top_fraction: 0.2

regime_analysis:
  enabled: true
  output_dir: results/regimes
  market_proxy: SPY
  # Volatility labels use lagged rolling proxy volatility by default, then compare
  # against expanding historical quantiles so future data cannot relabel past days.
  volatility_window: 60
  volatility_min_periods: 60
  volatility_quantile_method: historical_expanding
  high_volatility_quantile: 0.75
  low_volatility_quantile: 0.25
  # Bull/bear labels are optional and require enough lagged market proxy history.
  enable_bull_bear: true
  bull_bear_window: 200
  bull_bear_min_periods: 200
  minimum_observations_per_regime: 20
  summary_ranking_metric: sharpe_ratio
  special_periods:
    covid_stress:
      start: "2020-02-01"
      end: "2020-06-30"
    rate_hike_drawdown:
      start: "2022-01-01"
      end: "2022-12-31"
    final_holdout_2025:
      start: "2025-01-01"
      end: "2025-12-31"

regimes:
  enabled:
    - full_sample
    - high_volatility
    - low_volatility
    - bull_market
    - bear_market
    - 2020_stress_period
    - 2022_rate_hike_drawdown_period
    - 2025_out_of_sample_extension

reporting:
  output_dir: reports
  formats:
    - markdown
    - html
  include_sections:
    - Executive Summary
    - Strategy Hypothesis
    - Data and Universe
    - Pair Selection Methodology
    - Spread Construction
    - Forecasting Models
    - Signal and Portfolio Construction
    - Backtest Assumptions
    - Forecasting Results
    - Trading Performance
    - Robustness Analysis
    - Market Regime Analysis
    - Risk Analysis
    - Limitations
    - Deployment Considerations
    - Conclusion
  exclude_sections:
    - Literature Review
    - References
    - Academic citations
    - Bibliography
    - Citation management
